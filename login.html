<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শিক্ষার্থী লগইন - ত্বরণ কোচিং সেন্টার</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-lime-950 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-center">
                <span class="text-2xl font-extrabold text-yellow-300 block">ত্বরণ</span>
                <span class="text-sm text-white">কোচিং সেন্টার</span>
            </a>
            <a href="index.html" class="text-white hover:text-yellow-300 transition">
                <i class="fas fa-home mr-2"></i>হোম
            </a>
        </div>
    </header>

    <!-- Login Form -->
    <div class="flex items-center justify-center min-h-screen py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div class="text-center">
                <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                    শিক্ষার্থী লগইন
                </h2>
                <p class="mt-2 text-sm text-gray-600">
                    আপনার একাউন্টে প্রবেশ করুন
                </p>
            </div>

            <!-- Login Form -->
            <form class="mt-8 space-y-6" id="loginForm">
                <div class="rounded-md shadow-sm space-y-4">
                    <div>
                        <label for="studentId" class="block text-sm font-medium text-gray-700 mb-1">
                            শিক্ষার্থী আইডি অথবা ইমেইল
                        </label>
                        <input id="studentId" name="studentId" type="text" required
                               class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-lime-500 focus:border-lime-500 focus:z-10"
                               placeholder="TH2025001 অথবা example@email.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                            পাসওয়ার্ড
                        </label>
                        <div class="relative">
                            <input id="password" name="password" type="password" required
                                   class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-lime-500 focus:border-lime-500 pr-10"
                                   placeholder="আপনার পাসওয়ার্ড">
                            <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i class="fas fa-eye text-gray-400 hover:text-gray-600"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox"
                               class="h-4 w-4 text-lime-600 focus:ring-lime-500 border-gray-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900">
                            আমাকে মনে রাখুন
                        </label>
                    </div>
                    <div class="text-sm">
                        <a href="#" class="font-medium text-lime-600 hover:text-lime-500">
                            পাসওয়ার্ড ভুলে গেছেন?
                        </a>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                    <span class="block sm:inline"></span>
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="hidden text-center">
                    <i class="fas fa-spinner fa-spin text-lime-600 text-xl"></i>
                    <span class="ml-2 text-gray-600">লগইন করা হচ্ছে...</span>
                </div>

                <div>
                    <button type="submit" id="loginBtn"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-lime-600 hover:bg-lime-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-lime-500 transition duration-200">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <i class="fas fa-sign-in-alt text-lime-500 group-hover:text-lime-400"></i>
                        </span>
                        লগইন করুন
                    </button>
                </div>
            </form>

            <!-- Register Link -->
            <div class="text-center">
                <p class="text-sm text-gray-600">
                    নতুন শিক্ষার্থী?
                    <a href="enroll.html" class="font-medium text-lime-600 hover:text-lime-500">
                        এখানে ভর্তি হন
                    </a>
                </p>
            </div>

            <!-- Demo Credentials -->
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                <h3 class="text-sm font-medium text-blue-800 mb-2">ডেমো একাউন্ট:</h3>
                <div class="text-sm text-blue-700 space-y-1">
                    <p><strong>আইডি:</strong> TH2025001 অথবা ahmed@example.com</p>
                    <p><strong>পাসওয়ার্ড:</strong> password123</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
